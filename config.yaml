        failed_evidence: excluded/evidence/panel_app
        evidence: output/evidence_genomics_england
      settings:
        evidence_format: parquet
        datasource_id: genomics_england
        score_expression: |
          element_at(
            map(
              'amber', 0.5,
              'green', 1.0
            ),
            confidence
          )
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId
          - diseaseFromSource
          - studyId

  evidence_postprocess_project_score:
    - name: pyspark evidence_postprocess
      pyspark: evidence_postprocess
      source:
        evidence_path: intermediate/evidence/project_score.parquet
        target_path: output/target
        disease_path: output/disease/
        publication_date_lut: input/literature/literature_export/
      destination:
        failed_evidence: excluded/evidence/crispr
        evidence: output/evidence_crispr
      settings:
        evidence_format: parquet
        datasource_id: crispr
        score_expression: linear_rescale(resourceScore, 41.5, 100, 0.415, 1.0)
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId

  evidence_postprocess_cosmic:
    - name: pyspark evidence_postprocess
      pyspark: evidence_postprocess
      source:
        evidence_path: input/evidence/cosmic.json.gz
        target_path: output/target
        disease_path: output/disease
        publication_date_lut: input/literature/literature_export
      destination:
        failed_evidence: excluded/evidence/cancer_gene_census
        evidence: output/evidence_cancer_gene_census
      settings:
        evidence_format: json
        datasource_id: cancer_gene_census
        score_expression: resourceScore
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId
        direction_on_trait_expression: CASE WHEN diseaseId IS NOT NULL THEN 'risk' END
        direction_on_target_expression: |
          CASE
            WHEN TSorOncogene == 'oncogene' THEN 'GoF'
            WHEN TSorOncogene == 'tsg' THEN 'LoF'
            ELSE null
          END

  evidence_postprocess_ot_crispr:
    - name: pyspark evidence_postprocess
      pyspark: evidence_postprocess
      source:
        evidence_path: intermediate/evidence/ot_crispr.parquet
        target_path: output/target
        disease_path: output/disease
        publication_date_lut: input/literature/literature_export
      destination:
        failed_evidence: excluded/evidence/ot_crispr
        evidence: output/evidence_ot_crispr
      settings:
        evidence_format: parquet
        datasource_id: ot_crispr
        score_expression: '1.0'
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId
          - studyId
          - diseaseFromSourceMappedId
          - targetFromSourceId
          - resourceScore
          - statisticalTestTail

  evidence_postprocess_encore:
    - name: pyspark evidence_postprocess
      pyspark: evidence_postprocess
      source:
        evidence_path: input/evidence/encore.json.gz
        target_path: output/target
        disease_path: output/disease
        publication_date_lut: input/literature/literature_export
      destination:
        failed_evidence: excluded/evidence/encore
        evidence: output/evidence_encore
      settings:
        evidence_format: json
        datasource_id: encore
        score_expression: pvalue_linear_score(geneticInteractionPValue, 1.0, 0.01, 0.0, 1.0)
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId
          - targetFromSourceId
          - interactingTargetFromSourceId
          - diseaseFromSourceMappedId
          - diseaseCellLines

  evidence_postprocess_validation_lab:
    - name: pyspark evidence_postprocess
      pyspark: evidence_postprocess
      source:
        evidence_path: input/evidence/validation_lab.json.gz
        target_path: output/target
        disease_path: output/disease
        publication_date_lut: input/literature/literature_export
      destination:
        failed_evidence: excluded/evidence/ot_crispr_validation
        evidence: output/evidence_ot_crispr_validation
      settings:
        evidence_format: json
        datasource_id: ot_crispr_validation
        score_expression: resourceScore
        unique_fields:
          - targetId
          - targetFromSourceId
          - diseaseId
          - datasourceId
          - targetFromSourceId
          - diseaseFromSourceMappedId
          - resourceScore
          - diseaseCellLines
          - primaryProjectId
  ##################################################################################################

  #: Association on the fly STEP :##################################################################
  association_otf:
    - name: pyspark association_otf
      pyspark: association_otf
      properties:
        spark.driver.memory: '20g'
      source:
        disease: output/disease
        evidence: output/evidence_*
        target: output/target
        association_direct: output/association_overall_direct
        association_indirect: output/association_overall_indirect
      destination: view/association_otf
  ##################################################################################################

  #: VEP View generation STEP :#####################################################################
  vep_view:
    - name: pyspark generate vep view
      pyspark: vep_view
      source:
        credible_set: output/credible_set
        study_table: output/study
        l2g_table: output/l2g_prediction
        biosample: output/biosample
      destination:
        vep_data_header: intermediate/vep_view_header.tsv
        vep_data_all: intermediate/vep_view
        vep_data_gwas: intermediate/vep_view_gwas
        vep_data_qtl: intermediate/vep_view_qtl
      properties:
        spark.driver.memory: 16g
  ##################################################################################################

  #: ASSOCIATION TIMESERIES VIEW STEP :#############################################################
  association_timeseries_view:
    - name: pyspark timeseries view
      pyspark: association_timeseries_view
      source:
        association_overall_direct: output/association_overall_direct
        association_overall_indirect: output/association_overall_indirect
        association_by_datasource_direct: output/association_by_datasource_direct
        association_by_datasource_indirect: output/association_by_datasource_indirect
      destination: view/association_timeseries
      properties:
        spark.driver.memory: 12g
  ##################################################################################################

  #: RELEASE METRICS STEP :##########################################################################
  release_metrics:
    - name: transform release_metrics
      transformer: release_metrics
      source: {}
      destination:
        parquet: metrics.parquet
      settings:
        ot_release: '{{release_name}}'
        metric_scopes:
          - /output/*/
          - /excluded/evidence/*/
        rich_dataset_whitelist:
          - /output/evidence_*
          - /excluded/evidence/*
          - /output/association_by_datasource_direct
          - /output/association_by_datasource_indirect
          - /output/disease
          - /output/target
          - /output/drug_molecule
          - /output/study
          - /output/clinical_report
        upload_to_hf_hub: false
        hf_token_filename: /var/run/secrets/hf_token
        hf_repo_id: opentargets/ot-release-metrics
        hf_data_dir: metrics
  ##################################################################################################
