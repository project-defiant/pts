              exists(
                transform(
                  mutatedSamples,
                  x -> x.functionalConsequenceId
                ), y -> y IN ("SO_0002054")
              )
            THEN 'LoF'
            WHEN mutatedSamples IS NOT NULL AND
              exists(
                transform(
                  mutatedSamples,
                  x -> x.functionalConsequenceId
                ), y -> y IN ("SO_0002053")
              )
            THEN 'GoF'
